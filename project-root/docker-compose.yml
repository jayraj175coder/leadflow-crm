services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadflow
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    working_dir: /app
    command: sh -c "npx prisma db push && npx prisma db seed && npm run dev"
    environment:
      DATABASE_URL: postgresql://leadflow:leadflow@db:5432/leadflow?schema=public
      PORT: 8000
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
