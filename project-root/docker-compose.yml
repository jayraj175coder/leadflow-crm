services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "until python -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('db', 5432)); s.close()\"; do sleep 1; done &&
      python backend/manage.py migrate &&
      python backend/manage.py seed_demo_data &&
      gunicorn config.wsgi:application --chdir backend --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: change-me
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >
      sh -c "until python -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('db', 5432)); s.close()\"; do sleep 1; done &&
      cd backend &&
      celery -A config worker --loglevel=info"
    environment:
      DJANGO_SECRET_KEY: change-me
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
